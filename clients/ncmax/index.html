<style>
  html{scroll-behavior:smooth}
  body{font-family:'Inter',sans-serif;background:#f5f6fb;color:#0e1330}
  .font-display{font-family:'Plus Jakarta Sans',sans-serif}
  .font-mono{font-family:'IBM Plex Mono',monospace;font-variant-numeric:tabular-nums}
  ::-webkit-scrollbar{height:8px;width:8px}
  ::-webkit-scrollbar-thumb{background:#c7ccdd;border-radius:8px}
  .no-scrollbar::-webkit-scrollbar{display:none}
  .no-scrollbar{-ms-overflow-style:none;scrollbar-width:none}
  [data-view]{display:none}
  [data-view].active{display:block}
  .card-hover{transition:transform .35s cubic-bezier(.2,.7,.2,1),box-shadow .35s}
  .card-hover:hover{transform:translateY(-6px);box-shadow:0 20px 40px -12px rgba(12,21,72,.18)}
  .flip-num{display:inline-block;background:#0c1548;color:#ffc72c;border-radius:4px;padding:2px 6px;box-shadow:inset 0 -2px 0 rgba(0,0,0,.35), 0 1px 0 rgba(255,255,255,.05)}
  .board-row{border-bottom:1px dashed rgba(255,255,255,.14)}
  .board-row:last-child{border-bottom:none}
  .chip{border:1px solid #e3e6f1;background:#fff}
  .chip.active{background:#0c1548;color:#fff;border-color:#0c1548}
  .reveal{opacity:0;transform:translateY(18px);transition:opacity .6s ease,transform .6s ease}
  .reveal.in{opacity:1;transform:translateY(0)}
  .marquee-track{display:flex;width:max-content;animation:marquee 34s linear infinite}
  @keyframes marquee{from{transform:translateX(0)}to{transform:translateX(-50%)}}
  .skeleton{background:linear-gradient(90deg,#eef0f7 25%,#e4e7f2 37%,#eef0f7 63%);background-size:400% 100%;animation:sk 1.4s ease infinite}
  @keyframes sk{0%{background-position:100% 50%}100%{background-position:0 50%}}
  .focus-ring:focus-visible{outline:3px solid #ffc72c;outline-offset:2px}
  dialog::backdrop{background:rgba(8,15,51,.55);backdrop-filter:blur(2px)}
  dialog{border:none;padding:0;background:transparent;max-width:none;max-height:none}
  @media (prefers-reduced-motion: reduce){.card-hover,.reveal,.marquee-track{transition:none;animation:none!important}}
</style>

/* ---------- ROUTER ---------- */
const app = document.getElementById('app');
let STATE = { cat:'all', floor:'all', q:'' };

function route(){
  const hash = location.hash.slice(1) || '/';
  const parts = hash.split('/').filter(Boolean);
  window.scrollTo({top:0,behavior:'instant'});
  if(parts.length===0) return renderHome();
  const b = BRANCHES[parts[0]];
  if(!b) return renderHome();
  const page = parts[1];
  STATE = { cat:'all', floor:'all', q:'' };
  if(!page) return renderBranch(b);
  if(page==='prevadzky') return renderStores(b);
  if(page==='mapa') return renderMap(b);
  if(page==='akcie-a-zlavy') return renderPromo(b);
  if(page==='podujatia') return renderEvents(b);

}

function paintStores(b){
  let list = b.stores.filter(s=>
    (STATE.cat==='all'||s.c===STATE.cat) &&
    (STATE.floor==='all'||s.f===STATE.floor) &&
    (STATE.q===''||s.n.toLowerCase().includes(STATE.q.toLowerCase()))
  );
  document.getElementById('resultsMeta').textContent = `${list.length} ${list.length===1?'prevádzka':'prevádzok'}`;

    grid.innerHTML = `<div class="col-span-full text-center py-16 border border-dashed border-line2 rounded-2xl">

      <p class="text-sm text-slate2">Skúste zmeniť kategóriu, poschodie alebo hľadaný výraz.</p>
    </div>`;

  grid.innerHTML = list.map(s=>storeCard(b,s,false)).join('');
}

            ${Object.entries(ZONECOLOR).slice(0,10).map(([k,c])=>`<span class="flex items-center gap-1.5"><span class="w-2.5 h-2.5 rounded-sm" style="background:${c}"></span>${CATNAME[k]}</span>`).join('')}
          </div>

      </aside>
    </div>
  </section>
  ${footer(b)}
  <dialog id="storeModal"></dialog>
  `;
  window.CURBRANCH = b;

function setMapFloor(slug, f){ STATE.floor = f; renderMap(BRANCHES[slug]); }
function paintMap(b, floor){
  const stores = b.stores.filter(s=>s.f===floor);
  const cols = stores.length > 24 ? 8 : 6;
  const cw = 118, ch = 74, gx = 10, gy = 10, padX = 20, padY = 20;
  const rows = Math.ceil(stores.length/cols);
  const w = cols*(cw+gx)+padX*2;
  const h = rows*(ch+gy)+padY*2;
  let svg = `<svg viewBox="0 0 ${w} ${h}" class="w-full h-auto" role="img" aria-label="Schéma podlažia ${floor}">`;
  svg += `<rect x="1" y="1" width="${w-2}" height="${h-2}" rx="18" fill="#f5f6fb" stroke="#e3e6f1"/>`;
  stores.forEach((s,i)=>{
    const col = i%cols, row = Math.floor(i/cols);
    const x = padX + col*(cw+gx), y = padY + row*(ch+gy);
    const color = ZONECOLOR[s.c]||'#9098b3';
    svg += `<g style="cursor:pointer" onclick="openStore('${b.slug}','${encodeURIComponent(s.n)}')">
      <rect x="${x}" y="${y}" width="${cw}" height="${ch}" rx="10" fill="${color}" opacity="0.14"/>
      <rect x="${x}" y="${y}" width="${cw}" height="${ch}" rx="10" fill="none" stroke="${color}" stroke-width="1.5"/>
      <rect x="${x}" y="${y}" width="6" height="${ch}" rx="3" fill="${color}"/>
      <text x="${x+14}" y="${y+ch/2-4}" font-size="11" font-family="Plus Jakarta Sans, sans-serif" font-weight="700" fill="#0e1330">${escXml(truncate(s.n,14))}</text>
      <text x="${x+14}" y="${y+ch/2+14}" font-size="9.5" font-family="IBM Plex Mono, monospace" fill="#5b6280">${s.h.split('–')[0]}</text>
    </g>`;
  });
  svg += `</svg>`;
  document.getElementById('mapSvgWrap').innerHTML = svg || '<p class="text-sm text-slate2 p-6">Na tomto podlaží momentálne nie sú evidované prevádzky.</p>';
}
function truncate(s,n){return s.length>n? s.slice(0,n-1)+'…' : s;}
function escXml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
