  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

  .pm-root *, .pm-root *::before, .pm-root *::after { box-sizing: border-box; margin: 0; padding: 0; }

  .pm-root {
    --c-primary: #1B3A6B;
    --c-primary-dark: #122849;
    --c-primary-light: #2450A0;
    --c-accent: #E85D04;
    --c-accent-dark: #C94F03;
    --c-accent-light: #FF6B1A;
    --c-bg: #F7F8FC;
    --c-white: #FFFFFF;
    --c-dark: #0F1E38;
    --c-text: #1A1D2E;
    --c-muted: #5A6478;
    --c-light: #8A93A8;
    --c-border: #E2E6F0;
    --sh-sm: 0 2px 8px rgba(27,58,107,0.06);
    --sh-md: 0 8px 32px rgba(27,58,107,0.10);
    --sh-lg: 0 20px 60px rgba(27,58,107,0.14);
    --r: 16px;
    --r-sm: 10px;
    --r-lg: 24px;
    font-family: 'Inter', sans-serif;
    background: var(--c-bg);
    color: var(--c-text);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    width: 100%;
    overflow-x: hidden;
  }

  /* NAV */
  .pm-nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(226,230,240,0.6);
    transition: all 0.3s ease;
  }
  .pm-nav.scrolled { background: rgba(255,255,255,0.98); box-shadow: var(--sh-md); }
  .pm-nav-inner {
    max-width: 1240px; margin: 0 auto; padding: 0 24px;
    height: 72px; display: flex; align-items: center; justify-content: space-between;
  }
  .pm-logo { display: flex; align-items: center; gap: 12px; text-decoration: none; }
  .pm-logo-mark {
    width: 44px; height: 44px;
    background: linear-gradient(135deg, var(--c-primary), var(--c-primary-light));
    border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .pm-logo-mark svg { width: 24px; height: 24px; stroke: white; fill: none; stroke-width: 2; }
  .pm-logo-text { display: flex; flex-direction: column; line-height: 1.1; }
  .pm-logo-name { font-size: 17px; font-weight: 800; color: var(--c-primary); letter-spacing: -0.3px; }
  .pm-logo-sub { font-size: 10px; font-weight: 500; color: var(--c-muted); letter-spacing: 0.8px; text-transform: uppercase; }
  .pm-nav-links { display: flex; align-items: center; gap: 4px; list-style: none; }
  .pm-nav-links a {
    text-decoration: none; font-size: 14px; font-weight: 500; color: var(--c-muted);
    padding: 8px 14px; border-radius: 8px; transition: all 0.2s ease;
  }
  .pm-nav-links a:hover { color: var(--c-primary); background: rgba(27,58,107,0.06); }
  .pm-nav-cta {
    background: var(--c-accent) !important; color: white !important;
    padding: 10px 20px !important; border-radius: 10px !important; font-weight: 600 !important;
  }
  .pm-nav-cta:hover { background: var(--c-accent-dark) !important; color: white !important; transform: translateY(-1px); box-shadow: 0 4px 16px rgba(232,93,4,0.3) !important; }
  .pm-hamburger {
    display: none; flex-direction: column; gap: 5px; cursor: pointer;
    padding: 8px; border-radius: 8px; transition: background 0.2s; background: none; border: none;
  }
  .pm-hamburger:hover { background: var(--c-border); }
  .pm-hamburger span { display: block; width: 24px; height: 2px; background: var(--c-text); border-radius: 2px; transition: all 0.3s ease; }

  /* MOBILE MENU */
  .pm-mobile-menu {
    display: none; position: fixed;
    top: 72px; left: 0; right: 0;
    background: white; border-bottom: 1px solid var(--c-border);
    padding: 20px 24px 28px; z-index: 999; box-shadow: var(--sh-lg);
    flex-direction: column; gap: 4px;
  }
  .pm-mobile-menu.open { display: flex; }
  .pm-mobile-menu a {
    text-decoration: none; font-size: 15px; font-weight: 500; color: var(--c-text);
    padding: 12px 16px; border-radius: 10px; transition: all 0.2s;
  }
  .pm-mobile-menu a:hover { background: var(--c-bg); color: var(--c-primary); }

  /* HERO */
  .pm-hero {
    min-height: 100vh; padding-top: 72px;
    background: linear-gradient(135deg, var(--c-primary-dark) 0%, var(--c-primary) 50%, var(--c-primary-light) 100%);
    display: flex; align-items: center; position: relative; overflow: hidden;
  }
  .pm-hero-blob {
    position: absolute; right: -10%; top: -10%; width: 650px; height: 650px;
    background: radial-gradient(circle, rgba(232,93,4,0.15) 0%, transparent 65%);
    border-radius: 50%; pointer-events: none;
  }
  .pm-hero-pattern {
    position: absolute; inset: 0; pointer-events: none;
    background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/svg%3E");
  }
  .pm-hero-inner {
    max-width: 1240px; margin: 0 auto; padding: 80px 24px;
    display: grid; grid-template-columns: 1fr 1fr; gap: 64px; align-items: center;
    position: relative; z-index: 1; width: 100%;
  }
  .pm-hero-badge {
    display: inline-flex; align-items: center; gap: 8px;
    background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15);
    color: rgba(255,255,255,0.85); padding: 8px 16px; border-radius: 100px;
    font-size: 13px; font-weight: 500; margin-bottom: 28px; backdrop-filter: blur(10px);
  }
  .pm-badge-dot {
    width: 6px; height: 6px; background: var(--c-accent-light);
    border-radius: 50%; animation: pmPulse 2s infinite;
  }
  @keyframes pmPulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(1.4)} }
  .pm-hero-title {
    font-size: clamp(38px, 5vw, 64px); font-weight: 900; color: white;
    line-height: 1.05; letter-spacing: -1.5px; margin-bottom: 24px;
  }
  .pm-hero-title em { font-style: normal; color: var(--c-accent-light); }
  .pm-hero-desc { font-size: 18px; color: rgba(255,255,255,0.72); margin-bottom: 40px; max-width: 480px; line-height: 1.7; }
  .pm-actions { display: flex; gap: 16px; flex-wrap: wrap; }
  .pm-btn-primary {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--c-accent); color: white; text-decoration: none;
    padding: 16px 32px; border-radius: 12px; font-size: 15px; font-weight: 700;
    transition: all 0.25s ease; border: none; cursor: pointer; font-family: 'Inter',sans-serif;
  }
  .pm-btn-primary:hover { background: var(--c-accent-dark); transform: translateY(-2px); box-shadow: 0 8px 28px rgba(232,93,4,0.4); }
  .pm-btn-primary svg { width: 18px; height: 18px; }
  .pm-btn-secondary {
    display: inline-flex; align-items: center; gap: 8px;
    background: rgba(255,255,255,0.12); color: white; text-decoration: none;
    padding: 16px 32px; border-radius: 12px; font-size: 15px; font-weight: 600;
    transition: all 0.25s ease; border: 1px solid rgba(255,255,255,0.2); cursor: pointer; backdrop-filter: blur(8px);
  }
  .pm-btn-secondary:hover { background: rgba(255,255,255,0.2); transform: translateY(-2px); }
  .pm-btn-secondary svg { width: 18px; height: 18px; }
  .pm-hero-stats {
    display: flex; gap: 32px; margin-top: 48px; padding-top: 40px;
    border-top: 1px solid rgba(255,255,255,0.12);
  }
  .pm-stat-num { font-size: 32px; font-weight: 800; color: white; line-height: 1; }
  .pm-stat-label { font-size: 13px; color: rgba(255,255,255,0.55); margin-top: 4px; }
  .pm-hero-img-frame {
    width: 100%; aspect-ratio: 4/3;
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
    border-radius: var(--r-lg); overflow: hidden;
    display: flex; align-items: center; justify-content: center; backdrop-filter: blur(4px); position: relative;
  }
  .pm-img-placeholder { display: flex; flex-direction: column; align-items: center; gap: 12px; color: rgba(255,255,255,0.3); }
  .pm-img-placeholder svg { width: 56px; height: 56px; opacity: 0.4; }
  .pm-img-placeholder p { font-size: 14px; }
  .pm-hero-float {
    position: absolute; bottom: -20px; left: -24px;
    background: white; border-radius: 14px; padding: 16px 20px;
    box-shadow: var(--sh-lg); display: flex; align-items: center; gap: 14px;
  }
  .pm-float-icon {
    width: 44px; height: 44px; background: rgba(27,58,107,0.08);
    border-radius: 10px; display: flex; align-items: center; justify-content: center;
  }
  .pm-float-icon svg { width: 22px; height: 22px; }
  .pm-float-p1 { font-size: 13px; font-weight: 700; color: var(--c-text); }
  .pm-float-p2 { font-size: 12px; color: var(--c-muted); margin-top: 2px; }

  /* SECTIONS */
  .pm-section { padding: 100px 0; }
  .pm-container { max-width: 1240px; margin: 0 auto; padding: 0 24px; }
  .pm-tag {
    display: inline-block; font-size: 12px; font-weight: 700; letter-spacing: 1.5px;
    text-transform: uppercase; color: var(--c-accent); background: rgba(232,93,4,0.08);

  .pm-svc-list li::before { content:''; width:6px; height:6px; background:var(--c-accent); border-radius:50%; margin-top:7px; flex-shrink:0; }
  .pm-svc-wide { grid-column: span 2; }

  /* WHY */
  .pm-why { background: linear-gradient(135deg, var(--c-primary-dark), var(--c-primary)); }
  .pm-why .pm-title { color: white; }

  .pm-why-card {
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);

  }
  .pm-why-card:hover { background: rgba(255,255,255,0.10); transform: translateY(-4px); }
  .pm-why-icon {
    width: 52px; height: 52px; background: rgba(232,93,4,0.15); border: 1px solid rgba(232,93,4,0.2);

  }
  .pm-why-icon svg { width: 26px; height: 26px; }
  .pm-why-title { font-size: 17px; font-weight: 700; color: white; margin-bottom: 10px; }
  .pm-why-desc { font-size: 14px; color: rgba(255,255,255,0.6); line-height: 1.65; }

  /* ABOUT */
  .pm-about { background: var(--c-white); }
  .pm-about-inner { display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: center; }
  .pm-about-img-wrap { position: relative; }
  .pm-about-img {
    width: 100%; aspect-ratio: 4/3;

  }

  .pm-about-badge {
    position: absolute; bottom: -24px; right: -24px;
    background: var(--c-accent); color: white; border-radius: 14px;
    padding: 20px 24px; box-shadow: 0 12px 40px rgba(232,93,4,0.35); text-align: center;
  }
  .pm-about-badge strong { display: block; font-size: 36px; font-weight: 900; line-height: 1; }
  .pm-about-badge span { font-size: 13px; font-weight: 500; opacity: 0.9; }
  .pm-about-content { padding-right: 20px; }
  .pm-about-text { font-size: 15px; color: var(--c-muted); line-height: 1.8; margin-bottom: 16px; }
  .pm-clients { margin-top: 36px; padding-top: 32px; border-top: 1px solid var(--c-border); }
  .pm-clients p { font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--c-light); margin-bottom: 20px; }
  .pm-client-logos { display: flex; gap: 12px; flex-wrap: wrap; }

  }

  /* KRBY */

  /* GALLERY */

    border-radius: 50%; display: flex; align-items: center; justify-content: center;

    box-shadow: var(--sh-md); transition: all 0.3s ease;
